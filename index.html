<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MAXIMUM ADVENTURE: CHUBI GOLD EDITION</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Gabarito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg-base:     oklch(12% 0.025 40);
      --bg-surface:  oklch(18% 0.030 38);
      --bg-elevated: oklch(22% 0.035 40);
      --red-primary: oklch(52% 0.22 25);
      --red-dim:     oklch(35% 0.15 25);
      --gold:        oklch(78% 0.18 85);
      --gold-dim:    oklch(55% 0.12 85);
      --text-main:   oklch(94% 0.015 80);
      --text-sub:    oklch(68% 0.018 60);
      --font-pixel:    'Silkscreen', monospace;
      --font-dialogue: 'Gabarito', sans-serif;
      --text-xs:   0.625rem;
      --text-sm:   0.75rem;
      --text-base: 1rem;
      --text-lg:   1.25rem;
      --text-xl:   1.5rem;
      --text-2xl:  2rem;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-dialogue);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }
  </style>
</head>
<body>
  <div id="app">
    <p style="color:var(--text-main);padding:20px;font-family:var(--font-pixel);font-size:var(--text-sm);">LOADING...</p>
  </div>
  <script>
    // Telegram Web App init
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#1e0c02');   /* approx oklch(12% 0.025 40) = --bg-base */
      tg.setBackgroundColor('#1e0c02');
    }

    // ── State ──
    const INITIAL_STATE = {
      currentMission: 0,   // 0 = prologue, 1–15 = missions, 16 = finale
      stats: { beer: 0, overpay: 0, family: 0, sugar: 0, gamer: 0 },
      earnedTitle: null,
      completed: false
    };

    let STATE = JSON.parse(JSON.stringify(INITIAL_STATE));

    function saveState() {
      try { localStorage.setItem('chubi_save', JSON.stringify(STATE)); } catch (_) {}
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('chubi_save');
        if (saved) {
          // Merge over INITIAL_STATE so new fields added in future updates get defaults
          const parsed = JSON.parse(saved);
          STATE = {
            ...JSON.parse(JSON.stringify(INITIAL_STATE)),
            ...parsed,
            stats: { ...INITIAL_STATE.stats, ...parsed.stats }
          };
          return true;
        }
      } catch (_) {
        // private-browsing SecurityError, QuotaExceededError, or corrupt save — start fresh
      }
      return false;
    }

    function resetState() {
      STATE = JSON.parse(JSON.stringify(INITIAL_STATE));
      try { localStorage.removeItem('chubi_save'); } catch (_) {}
    }

    // ── Title logic ──
    const TITLE_THRESHOLDS = [
      { stat: 'overpay', threshold: 150, title: 'MASTER OF OVERPAY 💎' },
      { stat: 'beer',    threshold: 200, title: 'EL PIVOZAVR LEGENDARIO 🍺' },
      { stat: 'family',  threshold: 100, title: 'FAMILY BOSS ❤️' },
      { stat: 'gamer',   threshold: 80,  title: 'GAMER SUPREME 🎮' },
      { stat: 'sugar',   threshold: 60,  title: 'SWEET LORD 🍰' },
    ];

    // ── Mission Data ──
    const MISSIONS = [
      {
        id: 1,
        title: "МИССИЯ 1: ИМЯ ЛЕГЕНДЫ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Слушай, перед тем как начать... Как тебя правильно называть? Просто хочу внести в летопись.",
        choices: [
          { text: "Максим. Просто Максим.", reward: { beer: 10 } },
          { text: "Пивозавр. Всегда Пивозавр.", reward: { beer: 40 } },
          { text: "Золотой мальчик, конечно.", reward: { overpay: 50 } }
        ]
      },
      {
        id: 2,
        title: "МИССИЯ 2: ИСПАНСКИЙ ДУХ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "¡JAJAJA! Слушай, а правда что ты в Испании говорил «JAJAJA» вместо «хахаха»? Местные понимали?",
        choices: [
          { text: "¡Claro que sí! Меня принимали за своего.", reward: { beer: 30, overpay: 10 } },
          { text: "Пробовал, но акцент выдавал.", reward: { beer: 20 } },
          { text: "Я молчал. Пиво говорит само за себя.", reward: { beer: 50 } }
        ]
      },
      {
        id: 3,
        title: "МИССИЯ 3: ПИВНАЯ ИСТОРИЯ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Легенда гласит — 120 сортов пива. Это правда или преувеличение для красивого числа?",
        choices: [
          { text: "Факт. Я считал. Лично.", reward: { beer: 60 } },
          { text: "Ну может 80. Но звучит хуже.", reward: { beer: 25 } },
          { text: "Какая разница — все были вкусные.", reward: { beer: 40, sugar: 10 } }
        ]
      },
      {
        id: 4,
        title: "МИССИЯ 4: СВЕТА",
        npc: "СВЕТА",
        portrait: "portraits/sveta.png",
        text: "Макс. Я знаю куда тебя ведут. И я согласна. Но сначала ответь честно — кто в нашем доме главный?",
        choices: [
          { text: "Я. Я же помог выбрать твою машину.", reward: { family: 20, gamer: 10 } },
          { text: "Ты, конечно. Люсик и Филька тоже за тебя.", reward: { family: 60 } },
          { text: "Люсик главный. Мы оба это знаем.", reward: { family: 40, sugar: 10 } }
        ]
      },
      {
        id: 5,
        title: "МИССИЯ 5: ЛЮСИК ПРОВЕРЯЕТ",
        npc: "ЛЮСИК 🐕",
        portrait: "portraits/lusik.png",
        text: "...",
        choices: [
          { text: "(Люсик смотрит молча. Ты чувствуешь вину.) Я всё объясню.", reward: { family: 40 } },
          { text: "Хороший пёс. Всё хорошо. Я скоро вернусь.", reward: { family: 30, beer: 10 } },
          { text: "ТЫ УМЕЕШЬ ЧИТАТЬ?!", reward: { gamer: 20, beer: 20 } }
        ]
      },
      {
        id: 6,
        title: "МИССИЯ 6: СЛАДКИЙ УРОВЕНЬ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Слышал, ты серьёзно относишься к десертам. Торт — это обязательная программа или бонус?",
        choices: [
          { text: "Обязательная. Без торта — не праздник.", reward: { sugar: 50 } },
          { text: "Бонус. Но всегда беру.", reward: { sugar: 35 } },
          { text: "Торт — это просто хлеб с кремом.", reward: { sugar: 10, beer: 10 } }
        ]
      },
      {
        id: 7,
        title: "МИССИЯ 7: МАШИНЫ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Ты помогал Свете выбирать машину. Как это выглядело на самом деле?",
        choices: [
          { text: "Я провёл полный анализ рынка. Профессионально.", reward: { gamer: 40, family: 20 } },
          { text: "Сказал 'бери эту' — и оказался прав.", reward: { gamer: 30, overpay: 10 } },
          { text: "Она уже выбрала. Я просто одобрил.", reward: { family: 40 } }
        ]
      },
      {
        id: 8,
        title: "МИССИЯ 8: МЕМ-ИМЕНА",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Финальный вопрос по идентичности: Чуби, Макс или Пивозавр — какое имя самое настоящее?",
        choices: [
          { text: "Чуби. Это душа.", reward: { beer: 30, sugar: 20 } },
          { text: "Макс. Это документы.", reward: { family: 20 } },
          { text: "Пивозавр. Это судьба.", reward: { beer: 50, overpay: 10 } }
        ]
      },
      {
        id: 9,
        title: "МИССИЯ 9: ИГРОВОЙ МИР",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Если бы твоя жизнь была игрой — какой жанр?",
        choices: [
          { text: "RPG. Прокачка и боссы.", reward: { gamer: 40 } },
          { text: "Симулятор жизни. Реализм.", reward: { family: 30 } },
          { text: "Файтинг. Всегда в движении.", reward: { gamer: 30, beer: 10 } }
        ]
      },
      {
        id: 10,
        title: "МИССИЯ 10: КОМАНДА ДРУЗЕЙ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Твои друзья — рейд-команда. Какая твоя роль в группе?",
        choices: [
          { text: "Танк. Принимаю удар первым.", reward: { beer: 30, family: 20 } },
          { text: "Хилер. Слежу за всеми.", reward: { family: 40 } },
          { text: "ДД. Максимальный урон по бюджету.", reward: { overpay: 40, beer: 10 } }
        ]
      },
      {
        id: 11,
        title: "МИССИЯ 11: АБУ-ДАБИ / ТУРЦИЯ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Абу-Даби или Турция — где Overpay Index достиг исторического максимума?",
        choices: [
          { text: "Абу-Даби. Там всё стоит как самолёт.", reward: { overpay: 70 } },
          { text: "Турция. Мы 'экономили' очень дорого.", reward: { overpay: 50, beer: 10 } },
          { text: "Одинаково. Я не считаю в отпуске.", reward: { overpay: 60, family: 10 } }
        ]
      },
      {
        id: 12,
        title: "МИССИЯ 12: АРМЕНИЯ",
        npc: "НИКА",
        portrait: "portraits/nika.png",
        text: "Свадьба в Армении. Что запомнилось больше всего?",
        choices: [
          { text: "Еда. Это было откровением.", reward: { sugar: 30, beer: 20 } },
          { text: "Атмосфера. Такого не забудешь.", reward: { family: 40 } },
          { text: "Сколько всего выпили. Рекорд.", reward: { beer: 50 } }
        ]
      },
      {
        id: 13,
        title: "МИССИЯ 13: ФИНАЛЬНЫЙ ТЕСТ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Последний вопрос перед финалом: мальчишник — это...",
        choices: [
          { text: "Ритуал перехода. Серьёзное дело.", reward: { beer: 20, family: 20 } },
          { text: "Повод собраться. Всё остальное неважно.", reward: { beer: 40 } },
          { text: "Финальный босс перед свадьбой.", reward: { beer: 30, gamer: 30 } }
        ]
      },
      {
        id: 14,
        title: "МИССИЯ 14: ПРИНЯТИЕ КВЕСТА",
        npc: "СВЕТА",
        portrait: "portraits/sveta.png",
        text: "Макс. Я знала об этом с самого начала. Иди. Люсик и Филька побудут со мной. Ты принимаешь квест?",
        choices: [
          { text: "Принимаю. Ты лучшая.", reward: { beer: 20, family: 40 } },
          { text: "А Люсик не обидится?", reward: { family: 30, beer: 20 } },
          { text: "¡SIEMPRE! Целую всех троих!", reward: { beer: 30, family: 30 } }
        ]
      },
      {
        id: 15,
        title: "МИССИЯ 15: ФИНАЛ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Ты прошёл все испытания, Пивозавр. Координаты мальчишника разблокированы. Готов?",
        choices: [
          { text: "¡ГОТОВ! ПОКАЗЫВАЙ!", reward: { beer: 10 } },
          { text: "Всегда готов.", reward: { beer: 10 } }
        ],
        isLast: true
      }
    ];

    // checkTitle re-evaluates on every call: highest-priority threshold that is met wins.
    // Since stats only increase, a title earned early can be superseded by a higher-priority
    // one later — this is intentional (array order defines priority).
    // Always calls saveState() so callers don't need to remember to persist the result.
    function checkTitle() {
      for (const t of TITLE_THRESHOLDS) {
        if (STATE.stats[t.stat] >= t.threshold) {
          STATE.earnedTitle = t.title;
          saveState();
          return t.title;
        }
      }
      return null;  // no threshold met yet
    }

    // ── Apply choice reward ──
    function applyReward(reward) {
      for (const [stat, value] of Object.entries(reward)) {
        if (STATE.stats[stat] !== undefined) {
          STATE.stats[stat] += value;
        }
      }
      checkTitle(); // checkTitle saves internally
    }

    // ── Navigation ──
    function goNext() {
      STATE.currentMission += 1;
      saveState();
      render();
    }

    // Boot
    window.addEventListener('DOMContentLoaded', () => {
      console.log('CHUBI GOLD EDITION — ready');
    });
  </script>
</body>
</html>
