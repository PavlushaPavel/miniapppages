<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MAXIMUM ADVENTURE: CHUBI GOLD EDITION</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Gabarito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg-base:     oklch(12% 0.025 40);
      --bg-surface:  oklch(18% 0.030 38);
      --bg-elevated: oklch(22% 0.035 40);
      --red-primary: oklch(52% 0.22 25);
      --red-dim:     oklch(35% 0.15 25);
      --gold:        oklch(78% 0.18 85);
      --gold-dim:    oklch(55% 0.12 85);
      --text-main:   oklch(94% 0.015 80);
      --text-sub:    oklch(68% 0.018 60);
      --font-pixel:    'Silkscreen', monospace;
      --font-dialogue: 'Gabarito', sans-serif;
      --text-xs:   0.625rem;
      --text-sm:   0.75rem;
      --text-base: 1rem;
      --text-lg:   1.25rem;
      --text-xl:   1.5rem;
      --text-2xl:  2rem;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-dialogue);
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) var(--space-4);
      background: var(--bg-surface);
      border-bottom: 2px solid var(--red-dim);
      font-family: var(--font-pixel);
      font-size: var(--text-xs);
      color: var(--text-sub);
      flex-shrink: 0;
      gap: var(--space-2);
    }
    .status-bar .mission-num { color: var(--gold); }
    .status-bar .stat { display: flex; align-items: center; gap: 3px; }
    .status-bar .stat-val { color: var(--text-main); }

    /* ── Portrait area ── */
    .portrait-area {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding-bottom: var(--space-2);
    }
    .portrait-area img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      object-position: bottom;
    }
    .portrait-placeholder { font-size: 80px; line-height: 1; }

    /* ── Dialogue Box ── */
    .dialogue-box {
      flex-shrink: 0;
      margin: 0 var(--space-4) var(--space-2);
      background: var(--bg-surface);
      border: 2px solid var(--red-primary);
      box-shadow: 4px 0 0 var(--red-dim), 0 4px 0 var(--red-dim), 4px 4px 0 var(--red-dim);
      border-radius: 2px;
      padding: var(--space-3) var(--space-4);
    }
    .dialogue-npc {
      font-family: var(--font-pixel);
      font-size: var(--text-sm);
      color: var(--red-primary);
      margin-bottom: var(--space-2);
      letter-spacing: 0.05em;
    }
    .dialogue-text {
      font-family: var(--font-dialogue);
      font-size: var(--text-base);
      line-height: 1.55;
      color: var(--text-main);
      min-height: 3.5em;
    }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1em;
      background: var(--red-primary);
      vertical-align: text-bottom;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── Choices ── */
    .choices {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4) var(--space-4);
    }
    .choice-btn {
      background: var(--bg-elevated);
      border: 2px solid var(--red-dim);
      border-radius: 2px;
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-dialogue);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      text-align: left;
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out, background 0.1s ease-out;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active {
      background: var(--red-dim);
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .choice-btn:not(:active) { box-shadow: 2px 2px 0 var(--red-dim); }
    .choice-letter {
      font-family: var(--font-pixel);
      font-size: var(--text-xs);
      color: var(--gold);
      margin-right: var(--space-2);
    }

    /* ── XP Pop ── */
    .xp-pop {
      position: fixed;
      font-family: var(--font-pixel);
      font-size: var(--text-sm);
      color: var(--gold);
      pointer-events: none;
      animation: xp-float 1.2s ease-out forwards;
      z-index: 100;
    }
    @keyframes xp-float {
      0%   { transform: translateY(0);     opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    /* ── Epic Shake ── */
    @keyframes epic-shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: epic-shake 0.4s ease-out; }

    /* ── Fade ── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fade-in 0.3s ease-out; }

    /* ── Full-screen screens ── */
    .fullscreen-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: var(--space-8);
      text-align: center;
      gap: var(--space-6);
    }
    .screen-title {
      font-family: var(--font-pixel);
      font-size: var(--text-xl);
      color: var(--gold);
      line-height: 1.4;
      text-shadow: 2px 2px 0 var(--red-dim);
    }
    .screen-subtitle {
      font-family: var(--font-dialogue);
      font-size: var(--text-base);
      color: var(--text-sub);
      line-height: 1.6;
      max-width: 65ch;
    }

    /* ── Progress Bar ── */
    .progress-track {
      width: 100%;
      max-width: 280px;
      height: 16px;
      background: var(--bg-elevated);
      border: 2px solid var(--red-dim);
      box-shadow: 2px 2px 0 var(--red-dim);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--red-primary);
      transition: width 0.1s linear;
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      width: 100%;
      max-width: 300px;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 2px solid var(--red-dim);
      box-shadow: 2px 2px 0 var(--red-dim);
      padding: var(--space-3);
      text-align: center;
    }
    .stat-card .stat-icon { font-size: 1.5rem; display: block; }
    .stat-card .stat-name {
      font-family: var(--font-pixel);
      font-size: 0.5rem;
      color: var(--text-sub);
      margin: var(--space-1) 0;
      letter-spacing: 0.05em;
    }
    .stat-card .stat-number {
      font-family: var(--font-pixel);
      font-size: var(--text-lg);
      color: var(--gold);
    }

    /* ── Big Button ── */
    .big-btn {
      background: var(--red-primary);
      border: none;
      box-shadow: 4px 4px 0 var(--red-dim);
      padding: var(--space-4) var(--space-8);
      font-family: var(--font-pixel);
      font-size: var(--text-sm);
      color: var(--text-main);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
    }
    .big-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--red-dim);
    }

    /* ── Coords block ── */
    .coords-block {
      background: var(--bg-surface);
      border: 2px solid var(--gold);
      box-shadow: 4px 4px 0 var(--gold-dim);
      padding: var(--space-4) var(--space-6);
      width: 100%;
      max-width: 300px;
    }
    .coords-block .coords-label {
      font-family: var(--font-pixel);
      font-size: var(--text-xs);
      color: var(--gold);
      margin-bottom: var(--space-2);
      letter-spacing: 0.1em;
    }
    .coords-block .coords-value {
      font-family: var(--font-dialogue);
      font-size: var(--text-base);
      color: var(--text-main);
      font-weight: 700;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <p style="color:var(--text-main);padding:20px;font-family:var(--font-pixel);font-size:var(--text-sm);">LOADING...</p>
  </div>
  <script>
    // Telegram Web App init
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#1e0c02');   /* approx oklch(12% 0.025 40) = --bg-base */
      tg.setBackgroundColor('#1e0c02');
    }

    // ── State ──
    const INITIAL_STATE = {
      currentMission: 0,   // 0 = prologue, 1–15 = missions, 16 = finale
      stats: { beer: 0, overpay: 0, family: 0, sugar: 0, gamer: 0 },
      earnedTitle: null,
      completed: false
    };

    let STATE = JSON.parse(JSON.stringify(INITIAL_STATE));

    function saveState() {
      try { localStorage.setItem('chubi_save', JSON.stringify(STATE)); } catch (_) {}
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('chubi_save');
        if (saved) {
          // Merge over INITIAL_STATE so new fields added in future updates get defaults
          const parsed = JSON.parse(saved);
          STATE = {
            ...JSON.parse(JSON.stringify(INITIAL_STATE)),
            ...parsed,
            stats: { ...INITIAL_STATE.stats, ...parsed.stats }
          };
          return true;
        }
      } catch (_) {
        // private-browsing SecurityError, QuotaExceededError, or corrupt save — start fresh
      }
      return false;
    }

    function resetState() {
      STATE = JSON.parse(JSON.stringify(INITIAL_STATE));
      try { localStorage.removeItem('chubi_save'); } catch (_) {}
    }

    // ── Title logic ──
    const TITLE_THRESHOLDS = [
      { stat: 'overpay', threshold: 150, title: 'MASTER OF OVERPAY 💎' },
      { stat: 'beer',    threshold: 200, title: 'EL PIVOZAVR LEGENDARIO 🍺' },
      { stat: 'family',  threshold: 100, title: 'FAMILY BOSS ❤️' },
      { stat: 'gamer',   threshold: 80,  title: 'GAMER SUPREME 🎮' },
      { stat: 'sugar',   threshold: 60,  title: 'SWEET LORD 🍰' },
    ];

    // ── Mission Data ──
    const MISSIONS = [
      {
        id: 1,
        title: "МИССИЯ 1: ИМЯ ЛЕГЕНДЫ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Слушай, перед тем как начать... Как тебя правильно называть? Просто хочу внести в летопись.",
        choices: [
          { text: "Максим. Просто Максим.", reward: { beer: 10 } },
          { text: "Пивозавр. Всегда Пивозавр.", reward: { beer: 40 } },
          { text: "Золотой мальчик, конечно.", reward: { overpay: 50 } }
        ]
      },
      {
        id: 2,
        title: "МИССИЯ 2: ИСПАНСКИЙ ДУХ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "¡JAJAJA! Слушай, а правда что ты в Испании говорил «JAJAJA» вместо «хахаха»? Местные понимали?",
        choices: [
          { text: "¡Claro que sí! Меня принимали за своего.", reward: { beer: 30, overpay: 10 } },
          { text: "Пробовал, но акцент выдавал.", reward: { beer: 20 } },
          { text: "Я молчал. Пиво говорит само за себя.", reward: { beer: 50 } }
        ]
      },
      {
        id: 3,
        title: "МИССИЯ 3: ПИВНАЯ ИСТОРИЯ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Легенда гласит — 120 сортов пива. Это правда или преувеличение для красивого числа?",
        choices: [
          { text: "Факт. Я считал. Лично.", reward: { beer: 60 } },
          { text: "Ну может 80. Но звучит хуже.", reward: { beer: 25 } },
          { text: "Какая разница — все были вкусные.", reward: { beer: 40, sugar: 10 } }
        ]
      },
      {
        id: 4,
        title: "МИССИЯ 4: СВЕТА",
        npc: "СВЕТА",
        portrait: "portraits/sveta.png",
        text: "Макс. Я знаю куда тебя ведут. И я согласна. Но сначала ответь честно — кто в нашем доме главный?",
        choices: [
          { text: "Я. Я же помог выбрать твою машину.", reward: { family: 20, gamer: 10 } },
          { text: "Ты, конечно. Люсик и Филька тоже за тебя.", reward: { family: 60 } },
          { text: "Люсик главный. Мы оба это знаем.", reward: { family: 40, sugar: 10 } }
        ]
      },
      {
        id: 5,
        title: "МИССИЯ 5: ЛЮСИК ПРОВЕРЯЕТ",
        npc: "ЛЮСИК 🐕",
        portrait: "portraits/lusik.png",
        text: "...",
        choices: [
          { text: "(Люсик смотрит молча. Ты чувствуешь вину.) Я всё объясню.", reward: { family: 40 } },
          { text: "Хороший пёс. Всё хорошо. Я скоро вернусь.", reward: { family: 30, beer: 10 } },
          { text: "ТЫ УМЕЕШЬ ЧИТАТЬ?!", reward: { gamer: 20, beer: 20 } }
        ]
      },
      {
        id: 6,
        title: "МИССИЯ 6: СЛАДКИЙ УРОВЕНЬ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Слышал, ты серьёзно относишься к десертам. Торт — это обязательная программа или бонус?",
        choices: [
          { text: "Обязательная. Без торта — не праздник.", reward: { sugar: 50 } },
          { text: "Бонус. Но всегда беру.", reward: { sugar: 35 } },
          { text: "Торт — это просто хлеб с кремом.", reward: { sugar: 10, beer: 10 } }
        ]
      },
      {
        id: 7,
        title: "МИССИЯ 7: МАШИНЫ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Ты помогал Свете выбирать машину. Как это выглядело на самом деле?",
        choices: [
          { text: "Я провёл полный анализ рынка. Профессионально.", reward: { gamer: 40, family: 20 } },
          { text: "Сказал 'бери эту' — и оказался прав.", reward: { gamer: 30, overpay: 10 } },
          { text: "Она уже выбрала. Я просто одобрил.", reward: { family: 40 } }
        ]
      },
      {
        id: 8,
        title: "МИССИЯ 8: МЕМ-ИМЕНА",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Финальный вопрос по идентичности: Чуби, Макс или Пивозавр — какое имя самое настоящее?",
        choices: [
          { text: "Чуби. Это душа.", reward: { beer: 30, sugar: 20 } },
          { text: "Макс. Это документы.", reward: { family: 20 } },
          { text: "Пивозавр. Это судьба.", reward: { beer: 50, overpay: 10 } }
        ]
      },
      {
        id: 9,
        title: "МИССИЯ 9: ИГРОВОЙ МИР",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Если бы твоя жизнь была игрой — какой жанр?",
        choices: [
          { text: "RPG. Прокачка и боссы.", reward: { gamer: 40 } },
          { text: "Симулятор жизни. Реализм.", reward: { family: 30 } },
          { text: "Файтинг. Всегда в движении.", reward: { gamer: 30, beer: 10 } }
        ]
      },
      {
        id: 10,
        title: "МИССИЯ 10: КОМАНДА ДРУЗЕЙ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Твои друзья — рейд-команда. Какая твоя роль в группе?",
        choices: [
          { text: "Танк. Принимаю удар первым.", reward: { beer: 30, family: 20 } },
          { text: "Хилер. Слежу за всеми.", reward: { family: 40 } },
          { text: "ДД. Максимальный урон по бюджету.", reward: { overpay: 40, beer: 10 } }
        ]
      },
      {
        id: 11,
        title: "МИССИЯ 11: АБУ-ДАБИ / ТУРЦИЯ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Абу-Даби или Турция — где Overpay Index достиг исторического максимума?",
        choices: [
          { text: "Абу-Даби. Там всё стоит как самолёт.", reward: { overpay: 70 } },
          { text: "Турция. Мы 'экономили' очень дорого.", reward: { overpay: 50, beer: 10 } },
          { text: "Одинаково. Я не считаю в отпуске.", reward: { overpay: 60, family: 10 } }
        ]
      },
      {
        id: 12,
        title: "МИССИЯ 12: АРМЕНИЯ",
        npc: "НИКА",
        portrait: "portraits/nika.png",
        text: "Свадьба в Армении. Что запомнилось больше всего?",
        choices: [
          { text: "Еда. Это было откровением.", reward: { sugar: 30, beer: 20 } },
          { text: "Атмосфера. Такого не забудешь.", reward: { family: 40 } },
          { text: "Сколько всего выпили. Рекорд.", reward: { beer: 50 } }
        ]
      },
      {
        id: 13,
        title: "МИССИЯ 13: ФИНАЛЬНЫЙ ТЕСТ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Последний вопрос перед финалом: мальчишник — это...",
        choices: [
          { text: "Ритуал перехода. Серьёзное дело.", reward: { beer: 20, family: 20 } },
          { text: "Повод собраться. Всё остальное неважно.", reward: { beer: 40 } },
          { text: "Финальный босс перед свадьбой.", reward: { beer: 30, gamer: 30 } }
        ]
      },
      {
        id: 14,
        title: "МИССИЯ 14: ПРИНЯТИЕ КВЕСТА",
        npc: "СВЕТА",
        portrait: "portraits/sveta.png",
        text: "Макс. Я знала об этом с самого начала. Иди. Люсик и Филька побудут со мной. Ты принимаешь квест?",
        choices: [
          { text: "Принимаю. Ты лучшая.", reward: { beer: 20, family: 40 } },
          { text: "А Люсик не обидится?", reward: { family: 30, beer: 20 } },
          { text: "¡SIEMPRE! Целую всех троих!", reward: { beer: 30, family: 30 } }
        ]
      },
      {
        id: 15,
        title: "МИССИЯ 15: ФИНАЛ",
        npc: "ЧУБИ",
        portrait: "portraits/chubi.png",
        text: "Ты прошёл все испытания, Пивозавр. Координаты мальчишника разблокированы. Готов?",
        choices: [
          { text: "¡ГОТОВ! ПОКАЗЫВАЙ!", reward: { beer: 10 } },
          { text: "Всегда готов.", reward: { beer: 10 } }
        ],
        isLast: true
      }
    ];

    // checkTitle re-evaluates on every call: highest-priority threshold that is met wins.
    // Since stats only increase, a title earned early can be superseded by a higher-priority
    // one later — this is intentional (array order defines priority).
    // Always calls saveState() so callers don't need to remember to persist the result.
    function checkTitle() {
      for (const t of TITLE_THRESHOLDS) {
        if (STATE.stats[t.stat] >= t.threshold) {
          STATE.earnedTitle = t.title;
          saveState();
          return t.title;
        }
      }
      return null;  // no threshold met yet
    }

    // ── Apply choice reward ──
    function applyReward(reward) {
      for (const [stat, value] of Object.entries(reward)) {
        if (STATE.stats[stat] !== undefined) {
          STATE.stats[stat] += value;
        }
      }
      checkTitle(); // checkTitle saves internally
    }

    // ── Navigation ──
    function goNext() {
      STATE.currentMission += 1;
      saveState();
      render();
    }

    // ── Typewriter ──
    function typewrite(element, text, onDone, speed) {
      speed = speed || 28;
      element.textContent = '';
      var i = 0;
      var cursor = document.createElement('span');
      cursor.className = 'cursor';
      element.appendChild(cursor);
      var interval = setInterval(function() {
        element.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          if (onDone) onDone();
        }
      }, speed);
      return interval;
    }

    // ── XP Pop ──
    function showXpPop(text, x, y) {
      var el = document.createElement('div');
      el.className = 'xp-pop';
      el.textContent = text;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 1300);
    }

    // ── Status Bar ──
    function renderStatusBar(container) {
      var el = document.createElement('div');
      el.className = 'status-bar';
      el.innerHTML =
        '<span class="stat"><span class="mission-num">МИС ' + STATE.currentMission + '/15</span></span>' +
        '<span class="stat">🍺<span class="stat-val">' + STATE.stats.beer + '</span></span>' +
        '<span class="stat">💎<span class="stat-val">' + STATE.stats.overpay + '</span></span>' +
        '<span class="stat">❤️<span class="stat-val">' + STATE.stats.family + '</span></span>';
      container.appendChild(el);
    }

    // ── Prologue ──
    function renderPrologue() {
      var app = document.getElementById('app');
      app.innerHTML = '';
      app.className = 'fade-in';
      var screen = document.createElement('div');
      screen.className = 'fullscreen-screen';
      screen.innerHTML =
        '<div class="screen-title">MAXIMUM<br>ADVENTURE</div>' +
        '<div style="font-family:var(--font-pixel);font-size:var(--text-sm);color:var(--gold);">CHUBI GOLD EDITION</div>' +
        '<div class="screen-subtitle">Загрузка персонажа...</div>' +
        '<div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>' +
        '<div id="prog-label" style="font-family:var(--font-pixel);font-size:var(--text-xs);color:var(--text-sub);">ИНИЦИАЛИЗАЦИЯ...</div>';
      app.appendChild(screen);
      var labels = [
        [10, 'ЗАГРУЗКА СТАТОВ...'],
        [30, 'ПИВНАЯ ИСТОРИЯ...'],
        [55, 'ИСПАНСКИЙ ДУХ...'],
        [75, 'ЗОЛОТОЙ СТАТУС...'],
        [90, 'КОМАНДА ГОТОВА...'],
        [100, 'ПЕРСОНАЖ ЗАГРУЖЕН!']
      ];
      var prog = document.getElementById('prog');
      var label = document.getElementById('prog-label');
      var step = 0;
      var tick = setInterval(function() {
        if (step >= labels.length) {
          clearInterval(tick);
          setTimeout(function() {
            STATE.currentMission = 1;
            saveState();
            render();
          }, 600);
          return;
        }
        prog.style.width = labels[step][0] + '%';
        label.textContent = labels[step][1];
        step++;
      }, 500);
    }

    // ── Handle Choice ──
    function handleChoice(choice, event) {
      var statIcons = { beer: '🍺', overpay: '💎', family: '❤️', sugar: '🍰', gamer: '🎮' };
      var rect = event.currentTarget.getBoundingClientRect();
      var i = 0;
      for (var stat in choice.reward) {
        if (choice.reward[stat] > 0) {
          (function(t, idx) {
            setTimeout(function() {
              showXpPop('+' + choice.reward[t] + ' ' + (statIcons[t] || t), rect.left + 20, rect.top - 10);
            }, idx * 150);
          })(stat, i);
          i++;
        }
      }
      var total = Object.values(choice.reward).reduce(function(a, b) { return a + b; }, 0);
      if (total >= 50) {
        var appEl = document.getElementById('app');
        appEl.classList.add('shake');
        setTimeout(function() { appEl.classList.remove('shake'); }, 500);
      }
      applyReward(choice.reward);
      setTimeout(function() {
        var next = STATE.currentMission + 1;
        if (next === 6 || next === 11) {
          STATE.currentMission = next;
          saveState();
          renderMidpoint();
        } else if (next > 15) {
          STATE.currentMission = 16;
          saveState();
          renderFinale();
        } else {
          STATE.currentMission = next;
          saveState();
          render();
        }
      }, 600);
    }

    // ── Mission Screen ──
    function renderMission(missionIndex) {
      var mission = MISSIONS[missionIndex - 1];
      if (!mission) { renderFinale(); return; }
      var app = document.getElementById('app');
      app.innerHTML = '';
      app.className = 'fade-in';
      renderStatusBar(app);
      var portraitArea = document.createElement('div');
      portraitArea.className = 'portrait-area';
      var img = document.createElement('img');
      img.src = mission.portrait;
      img.alt = mission.npc;
      img.onerror = function() {
        var emojis = { 'portraits/chubi.png': '🧙', 'portraits/sveta.png': '👩', 'portraits/lusik.png': '🐕', 'portraits/nika.png': '👩‍👧', 'portraits/max.png': '🦸', 'portraits/filka.png': '🐱' };
        portraitArea.innerHTML = '<div class="portrait-placeholder">' + (emojis[mission.portrait] || '🎭') + '</div>';
      };
      portraitArea.appendChild(img);
      app.appendChild(portraitArea);
      var dialogueBox = document.createElement('div');
      dialogueBox.className = 'dialogue-box';
      dialogueBox.innerHTML = '<div class="dialogue-npc">' + mission.npc + '</div><div class="dialogue-text" id="dial-text"></div>';
      app.appendChild(dialogueBox);
      var choicesEl = document.createElement('div');
      choicesEl.className = 'choices';
      choicesEl.style.opacity = '0';
      choicesEl.style.pointerEvents = 'none';
      var letters = ['A', 'B', 'C', 'D'];
      mission.choices.forEach(function(choice, idx) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = '<span class="choice-letter">[' + letters[idx] + ']</span>' + choice.text;
        btn.addEventListener('click', function(e) { handleChoice(choice, e); });
        choicesEl.appendChild(btn);
      });
      app.appendChild(choicesEl);
      var dialText = document.getElementById('dial-text');
      typewrite(dialText, mission.text, function() {
        choicesEl.style.opacity = '1';
        choicesEl.style.pointerEvents = 'auto';
        choicesEl.style.transition = 'opacity 0.3s ease-out';
      });
    }

    // ── Midpoint Stats ──
    function renderMidpoint() {
      var stats = STATE.stats;
      var milestone = STATE.currentMission - 1;
      var app = document.getElementById('app');
      app.innerHTML = '';
      app.className = 'fade-in';
      var screen = document.createElement('div');
      screen.className = 'fullscreen-screen';
      screen.innerHTML =
        '<div class="screen-title">ЧЕКПОИНТ<br>' + milestone + '/15</div>' +
        '<div class="screen-subtitle">Статистика Пивозавра обновлена</div>' +
        '<div class="stats-grid">' +
          '<div class="stat-card"><span class="stat-icon">🍺</span><div class="stat-name">BEER XP</div><div class="stat-number">' + stats.beer + '</div></div>' +
          '<div class="stat-card"><span class="stat-icon">💎</span><div class="stat-name">OVERPAY</div><div class="stat-number">' + stats.overpay + '</div></div>' +
          '<div class="stat-card"><span class="stat-icon">❤️</span><div class="stat-name">FAMILY</div><div class="stat-number">' + stats.family + '</div></div>' +
          '<div class="stat-card"><span class="stat-icon">🎮</span><div class="stat-name">GAMER XP</div><div class="stat-number">' + stats.gamer + '</div></div>' +
        '</div>' +
        '<button class="big-btn" id="continue-btn">ПРОДОЛЖИТЬ ▶</button>';
      app.appendChild(screen);
      document.getElementById('continue-btn').addEventListener('click', function() { render(); });
    }

    // Boot
    window.addEventListener('DOMContentLoaded', () => {
      console.log('CHUBI GOLD EDITION — ready');
    });
  </script>
</body>
</html>
